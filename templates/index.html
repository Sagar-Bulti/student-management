<!DOCTYPE html>
<html>
<head>
    <title>Student Management</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }

        table {
            border-collapse: collapse;
            width: 70%;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
        }

        input {
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 8px;
        }
    </style>
</head>

<body>

<h2>Student Record Management System</h2>

<form action="/add" method="POST">
    <input type="text" name="name" placeholder="Name" required>
    <input type="text" name="usn" placeholder="USN" required>
    <input type="text" name="branch" placeholder="Branch" required>

    <button type="submit">Add Student</button>
</form>

<br>

<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>USN</th>
        <th>Branch</th>
        <th>Action</th>
    </tr>

    {% for student in students %}
    <tr>
        <td>{{ student[0] }}</td>
        <td>{{ student[1] }}</td>
        <td>{{ student[2] }}</td>
        <td>{{ student[3] }}</td>
        <td>
            <a href="/delete/{{ student[0] }}">Delete</a>
        </td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
